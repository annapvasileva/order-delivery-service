services:
  postgres-order-delivery-service:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres-orders
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5009:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 30s
      timeout: 30s
      retries: 5
    networks:
      - app_network

  pgadmin:
    container_name: pgadmin-order-delivery
    image: dpage/pgadmin4:latest
    hostname: pgadmin
    restart: unless-stopped
    ports:
      - "5010:80"
    environment:
      - PGADMIN_DEFAULT_PASSWORD=pass
      - PGADMIN_DEFAULT_EMAIL=postgres@postgres.com
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    networks:
      - app_network

networks:
  app_network:
    driver: bridge